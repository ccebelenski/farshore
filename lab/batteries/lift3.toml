# lift3 — primer_c's SEA TRANSPORT section (user: describe the MECHANICS and
# the expected use) against the unchanged WHY-UNI board. Single lever vs
# lift2's WHY-UNI arm (launch 1/3, water-staging 1, marker leakage 3/3).
# Predictions: STAGE-on-water goes to zero; legal launch rate rises.

[battery]
name = "lift3"
prompt_dir = "lab/prompts/epoch2"
transcript_dir = "lab/transcripts/lift3"
seeds = [1, 2, 3]

[sampling]
temperature = 1.0
top_p = 0.95
top_k = 20
presence_penalty = 1.5
max_tokens = 12288
enable_thinking = true

[[conditions]]
name = "SEALIFT"
primer = "primer_c.txt"
board = "board_lift_uni.txt"
